# vc-rs VST3/CLAP plugin configuration — OPTIONAL headless seed.
#
# The plugin normally gets its models from the GUI (Browse buttons) and stores
# them in the project's plugin state. This file only SEEDS a fresh instance that
# has no saved settings yet; once a project has its own settings, this file is
# ignored. It is handy for automation / first-run defaults.
#
# Copy this file to one of the locations the plugin searches, in order:
#   1. the path in the VC_RS_VST3_CONFIG environment variable
#   2. <os-config-dir>/vc-rs/vst3.toml
#      (%APPDATA% on Windows, $XDG_CONFIG_HOME or ~/.config elsewhere)
#   3. vc-rs-vst3.toml in the host's working directory
#
# All fields are optional; omitted fields fall back to the defaults shown here
# (which match the CLI `run` defaults). The three model paths are required for
# conversion — if any is missing the plugin loads but stays silent.
# Use absolute paths. In TOML "double-quoted" strings a backslash is an escape
# character, so a Windows path like "C:\Users\..." fails to parse ("\U...").
# Use forward slashes ("C:/Users/...") — they work on every platform — or a
# single-quoted 'literal' string, or doubled backslashes "C:\\Users\\...".

# --- Models (required for conversion) ---
model = "/path/to/models/rvc/your_model.onnx"
embedder = "/path/to/models/hubert/contentvec.onnx"
f0_model = "/path/to/models/rmvpe/rmvpe.onnx"

# Optional: explicit embedder output tensor name.
# embedder_output = "output"

# --- Backend ---
# "cpu" | "cuda"
provider = "cuda"

# Pitch, Speaker, Input Gain and Output Gain are NOT set here: they are DAW
# parameters (the host saves/restores them per project and they are
# automatable). Set them from the plugin's controls in your DAW.

# --- Detection thresholds ---
f0_threshold = 0.3
silence_threshold = 0.0001

# --- Latency / chunking (milliseconds) ---
chunk_ms = 500             # larger = more context + more latency
crossfade_ms = 85
sola_search_ms = 12
rvc_output_tail_discard_ms = 10
extra_convert_ms = 100
smoother = "sola"          # "sola" | "psola"

# --- Volume handling ---
volume_envelope = false
rms_mix_rate = 0.0
auto_output_gain = false
target_output_rms = 0.03
max_output_gain = 512.0
