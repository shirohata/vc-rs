# Config for `cargo about generate` — produces the bundled third-party license
# notice for the .vst3 distribution.
#
#   cargo about generate --manifest-path crates/vc-vst3/Cargo.toml about.hbs \
#       -o crates/vc-vst3/dist/licenses/THIRD-PARTY-LICENSES.md
#
# Scope: the shipped Windows binary only — runtime deps for the default
# (windowsml) feature on the MSVC target, excluding build/dev dependencies.

targets = ["x86_64-pc-windows-msvc"]
ignore-build-dependencies = true
ignore-dev-dependencies = true
ignore-transitive-dependencies = false
private = { ignore = true }

# Permissive licenses present in the dependency tree. For dual/OR expressions
# cargo-about picks the first accepted match, so copyleft alternatives
# (GPL-2.0, LGPL-2.1, BlueOak) are intentionally omitted and never selected.
accepted = [
    "MIT",
    "Apache-2.0",
    "ISC",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "Zlib",
    "0BSD",
    "BSL-1.0",
    "Unicode-3.0",
    "Unlicense",
    "CDLA-Permissive-2.0",
    "OFL-1.1",
    "Ubuntu-font-1.0",
]
